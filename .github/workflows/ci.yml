name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  docker-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: glantri_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t glantri-api-test -f apps/api/Dockerfile .

      - name: Start API container
        run: |
          docker run -d --name api-test \
            --network host \
            -e DATABASE_URL="postgresql://postgres:postgres@localhost:5432/glantri_test" \
            -e WEB_ORIGIN="http://localhost:3000" \
            -e NODE_ENV="production" \
            glantri-api-test

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 12); do
            if curl -fsS http://localhost:4000/health; then
              echo ""
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying in 5s..."
            sleep 5
          done
          echo "API failed to start after 60s. Container logs:"
          docker logs api-test
          exit 1
