name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm coverage

      - name: Build
        run: pnpm build

  docker-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: glantri_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/glantri_test
        run: pnpm --filter @glantri/database exec prisma migrate deploy

      - name: Run integration tests
        env:
          DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/glantri_test
        run: pnpm --filter @glantri/database test

      - name: Build API image
        run: docker build -t glantri-api-test -f apps/api/Dockerfile .

      - name: Build Web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:4000 \
            -t glantri-web-test \
            -f apps/web/Dockerfile .

      - name: Start API container
        run: |
          docker run -d --name api-test \
            --network host \
            -e DATABASE_URL="postgresql://postgres:postgres@localhost:5432/glantri_test" \
            -e WEB_ORIGIN="http://localhost:3000" \
            -e NODE_ENV="production" \
            glantri-api-test

      - name: Start Web container
        run: |
          docker run -d --name web-test \
            --network host \
            -e NODE_ENV="production" \
            glantri-web-test

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 12); do
            if curl -fsS http://localhost:4000/health; then
              echo ""
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying in 5s..."
            sleep 5
          done
          echo "API failed to start after 60s. Container logs:"
          docker logs api-test
          exit 1

      - name: Wait for Web to be ready
        run: |
          for i in $(seq 1 12); do
            if curl -fsS -o /dev/null http://localhost:3000; then
              echo "Web started on attempt $i"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying in 5s..."
            sleep 5
          done
          echo "Web failed to start after 60s. Container logs:"
          docker logs web-test
          exit 1

      - name: Install Playwright browsers
        run: pnpm --filter @glantri/web exec playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_URL: http://localhost:4000
        run: pnpm --filter @glantri/web exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
