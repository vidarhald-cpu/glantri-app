services:
  postgres:
    image: postgres:16
    container_name: glantri-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: glantri
    ports:
      - "5432:5432"
    volumes:
      - glantri_postgres_data:/var/lib/postgresql/data

volumes:
  glantri_postgres_data:
